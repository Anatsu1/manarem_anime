<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactanos a través de Manarem.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/x-icon">
    <title>Contacto — Manarem</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-card form-card--wide">
                    <h1>Contacto</h1>
                    <p class="form-sub">¿Dudas o sugerencias? Escribinos.</p>
                    <form id="formContacto" autocomplete="off">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" name="nombre" id="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="mensaje">Mensaje</label>
                            <textarea name="mensaje" id="mensaje" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('formContacto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                mensaje: document.getElementById('mensaje').value
            };
            try {
                const result = await api.contacto.enviar(data);
                if (result.error) {
                    showAlert('Error al enviar: ' + result.error, 'error');
                } else {
                    showAlert('¡Mensaje enviado correctamente!', 'success');
                    document.getElementById('formContacto').reset();
                }
            } catch (error) {
                showAlert('No se pudo conectar con el servidor.', 'error');
            }
        });
    </script>
</body>
</html>
