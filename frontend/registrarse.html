<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrate en Manarem para descubrir animes, mangas y música.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
    <title>Registrarse — Manarem</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-card">
                    <h1>Crear cuenta</h1>
                    <p class="form-sub">Sumate a la comunidad de Manarem.</p>
                    <form id="formulario" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="Nombre">Nombre</label>
                            <input type="text" id="Nombre" name="Nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="Usuario">Usuario</label>
                            <input type="text" id="Usuario" name="Usuario" required>
                        </div>
                        <div class="form-group">
                            <label for="Email">Email</label>
                            <input type="email" id="Email" name="Email" required>
                        </div>
                        <div class="form-group">
                            <label for="imagen">Foto de perfil (opcional)</label>
                            <input type="file" id="imagen" name="imagen">
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="password2">Repetir contraseña</label>
                            <input type="password" id="password2" name="password2" required>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="terminos" required>
                            <label for="terminos">Acepto los <a href="/preguntas-frecuentes">términos y condiciones</a></label>
                        </div>
                        <button type="submit" class="btn">Crear cuenta</button>
                    </form>
                    <p class="form-alt">¿Ya tenés cuenta? <a href="/ingresar">Ingresá</a></p>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('formulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('Nombre').value,
                usuario: document.getElementById('Usuario').value,
                email: document.getElementById('Email').value,
                password: document.getElementById('password').value,
                password2: document.getElementById('password2').value
            };
            if (data.password !== data.password2) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }
            try {
                const result = await api.auth.registro(data);
                if (result.error) {
                    showAlert('Error: ' + result.error, 'error');
                } else {
                    showAlert('¡Registro exitoso! Ahora podés iniciar sesión.', 'success');
                    setTimeout(() => window.location.href = '/ingresar', 2000);
                }
            } catch (error) {
                showAlert('No se pudo conectar con el servidor. Verificá que el backend esté funcionando.', 'error');
            }
        });
    </script>
</body>
</html>
