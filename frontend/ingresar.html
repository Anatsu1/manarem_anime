<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ingresá a Manarem para descubrir animes, mangas y música.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/x-icon">
    <title>Ingresar — Manarem</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-card">
                    <h1>Ingresar</h1>
                    <p class="form-sub">Bienvenido de vuelta, otaku.</p>
                    <form id="formLogin">
                        <div class="form-group">
                            <label for="usuario">Usuario</label>
                            <input type="text" id="usuario" name="usuario" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn">Iniciar sesion</button>
                    </form>
                    <p class="form-alt">¿No tenés cuenta? <a href="/registrarse">Registrate</a></p>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                usuario: document.getElementById('usuario').value,
                password: document.getElementById('password').value
            };
            try {
                const result = await api.auth.login(data);
                if (result.error) {
                    showAlert('Credenciales incorrectas.', 'error');
                } else {
                    localStorage.setItem('user', JSON.stringify({ ...(result.usuario || {}), token: result.token }));
                    showAlert('¡Inicio de sesión exitoso!', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                }
            } catch (error) {
                showAlert('No se pudo conectar con el servidor.', 'error');
            }
        });
    </script>
</body>
</html>
