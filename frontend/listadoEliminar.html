<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Eliminar productos — Manarem">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/products_CRUD.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/x-icon">
    <title>Eliminar productos — Manarem</title>
</head>
<body>
    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title">Eliminar productos</h2>
                <div class="table-wrap">
                    <table id="productos-table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Imagen</th>
                                <th>Descripción</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Proveedor</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <a class="crud-back" href="/productos">← Volver al menú</a>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        async function obtenerProductos() {
            try {
                const data = await api.productos.listar();
                const tbody = document.getElementById('productos-table').querySelector('tbody');
                tbody.innerHTML = '';
                data.forEach(producto => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td>${producto.codigo}</td>
                        <td><img class="thumb" src="/static/img/${producto.imagen_url}" alt="${producto.descripcion}"></td>
                        <td>${producto.descripcion}</td>
                        <td>${producto.cantidad}</td>
                        <td>$${Number(producto.precio).toFixed(2)}</td>
                        <td>${producto.proveedor}</td>
                        <td><button class="btn-danger" onclick="eliminarProducto('${producto.codigo}')">Eliminar</button></td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) {
                showAlert('Error al obtener los productos.', 'error');
            }
        }

        async function eliminarProducto(codigo) {
            if (confirm('¿Estás seguro de que quieres eliminar este producto?')) {
                try {
                    const result = await api.productos.eliminar(codigo);
                    obtenerProductos();
                    if (result.mensaje) {
                        showAlert(result.mensaje, 'success');
                    } else {
                        showAlert('Producto eliminado correctamente.', 'success');
                    }
                } catch (error) {
                    showAlert(error.message || 'Error al eliminar el producto.', 'error');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', obtenerProductos);
    </script>
</body>
</html>
