<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Opiniones de la comunidad sobre Manarem: leé reseñas y dejá tu opinión sobre animes, mangas y productos.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/opiniones.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
    <title>Opiniones — Manarem</title>
</head>
<body>
    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title">Opiniones de la comunidad</h2>
                <p class="text-muted">Leé lo que otros usuarios opinan sobre Manarem y compartí tu experiencia.</p>
                <div id="opiniones-list" class="opiniones-list"></div>

                <div class="opinion-form-card">
                    <h3>Deja tu opinion</h3>
                    <form id="formOpinion">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                        <label for="texto">Tu opinión</label>
                        <textarea id="texto" name="texto" rows="4" required></textarea>
                        <button type="submit" class="btn">Enviar opinion</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        async function cargarOpiniones() {
            const lista = document.getElementById('opiniones-list');
            const opiniones = await api.opiniones.listar();
            lista.innerHTML = opiniones.map(op => `
                <article class="opinion-card">
                    <img class="opinion-avatar" src="/static/img/${op.avatar}" alt="Avatar de ${op.nombre}">
                    <div class="opinion-body">
                        <header class="opinion-head">
                            <h3>${op.nombre}</h3>
                            <time datetime="${op.fecha}">${op.fecha}</time>
                        </header>
                        <p>${op.texto}</p>
                    </div>
                </article>`).join('');
        }

        document.getElementById('formOpinion').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('nombre').value,
                texto: document.getElementById('texto').value,
            };
            const result = await api.opiniones.crear(data);
            if (result.error) {
                showAlert('Error al enviar opinión: ' + result.error, 'error');
            } else {
                showAlert('¡Opinión enviada correctamente!', 'success');
                e.target.reset();
                cargarOpiniones();
            }
        });

        cargarOpiniones();
    </script>
</body>
</html>
