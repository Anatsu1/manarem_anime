<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modificá productos del catálogo de Manarem.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/x-icon">
    <title>Modificar producto — Manarem</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-card form-card--wide">
                    <h1>Modificar producto</h1>
                    <p class="form-sub">Buscá un producto por código y editá sus datos.</p>

                    <form id="form-obtener-producto">
                        <div class="form-group">
                            <label for="codigo">Código del producto</label>
                            <input type="text" id="codigo" required>
                        </div>
                        <button type="submit" class="btn">Buscar</button>
                    </form>

                    <div id="datos-producto">
                        <form id="form-guardar-cambios">
                            <div class="form-group">
                                <label for="descripcionModificar">Descripción</label>
                                <input type="text" id="descripcionModificar" required>
                            </div>
                            <div class="form-group">
                                <label for="cantidadModificar">Cantidad</label>
                                <input type="number" id="cantidadModificar" required>
                            </div>
                            <div class="form-group">
                                <label for="precioModificar">Precio</label>
                                <input type="number" step="0.01" id="precioModificar" required>
                            </div>
                            <div class="form-group">
                                <label for="proveModificar">Proveedor</label>
                                <input type="number" id="proveModificar" required>
                            </div>
                            <div class="form-group">
                                <label for="nuevaImagen">Nueva Imagen</label>
                                <input type="file" id="nuevaImagen">
                            </div>
                            <img id="imagen-actual">
                            <img id="imagen-vista-previa">
                            <button type="submit" class="btn">Guardar cambios</button>
                        </form>
                    </div>

                    <p class="form-alt"><a href="/productos">← Volver al menú</a></p>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        let codigo = '';
        let descripcion = '';
        let cantidad = '';
        let precio = '';
        let proveedor = '';
        let imagen_url = '';
        let imagenSeleccionada = null;
        let imagenUrlTemp = null;
        let mostrarDatosProducto = false;

        document.getElementById('form-obtener-producto').addEventListener('submit', obtenerProducto);
        document.getElementById('form-guardar-cambios').addEventListener('submit', guardarCambios);
        document.getElementById('nuevaImagen').addEventListener('change', seleccionarImagen);

        async function obtenerProducto(event) {
            event.preventDefault();
            codigo = document.getElementById('codigo').value;
            try {
                const data = await api.productos.obtener(codigo);
                descripcion = data.descripcion;
                cantidad = data.cantidad;
                precio = data.precio;
                proveedor = data.proveedor;
                imagen_url = data.imagen_url;
                mostrarDatosProducto = true;
                mostrarFormulario();
            } catch (error) {
                showAlert('Código no encontrado.', 'error');
            }
        }

        function mostrarFormulario() {
            if (mostrarDatosProducto) {
                document.getElementById('descripcionModificar').value = descripcion;
                document.getElementById('cantidadModificar').value = cantidad;
                document.getElementById('precioModificar').value = precio;
                document.getElementById('proveModificar').value = proveedor;

                const imagenActual = document.getElementById('imagen-actual');
                if (imagen_url && !imagenSeleccionada) {
                    imagenActual.src = '/static/img/' + imagen_url;
                    imagenActual.style.display = 'block';
                } else {
                    imagenActual.style.display = 'none';
                }

                document.getElementById('datos-producto').style.display = 'block';
            } else {
                document.getElementById('datos-producto').style.display = 'none';
            }
        }

        function seleccionarImagen(event) {
            const file = event.target.files[0];
            imagenSeleccionada = file;
            imagenUrlTemp = URL.createObjectURL(file);

            const imagenVistaPrevia = document.getElementById('imagen-vista-previa');
            imagenVistaPrevia.src = imagenUrlTemp;
            imagenVistaPrevia.style.display = 'block';
        }

        async function guardarCambios(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append('codigo', codigo);
            formData.append('descripcion', document.getElementById('descripcionModificar').value);
            formData.append('cantidad', document.getElementById('cantidadModificar').value);
            formData.append('proveedor', document.getElementById('proveModificar').value);
            formData.append('precio', document.getElementById('precioModificar').value);

            if (imagenSeleccionada) {
                formData.append('imagen', imagenSeleccionada, imagenSeleccionada.name);
            }

            try {
                const result = await api.productos.modificar(codigo, formData);
                if (result.mensaje) {
                    showAlert('Producto actualizado correctamente.', 'success');
                    limpiarFormulario();
                } else {
                    showAlert('Error al actualizar el producto.', 'error');
                }
            } catch (error) {
                showAlert('Error al actualizar el producto.', 'error');
            }
        }

        function limpiarFormulario() {
            document.getElementById('codigo').value = '';
            document.getElementById('descripcionModificar').value = '';
            document.getElementById('cantidadModificar').value = '';
            document.getElementById('precioModificar').value = '';
            document.getElementById('proveModificar').value = '';
            document.getElementById('nuevaImagen').value = '';

            const imagenActual = document.getElementById('imagen-actual');
            imagenActual.style.display = 'none';

            const imagenVistaPrevia = document.getElementById('imagen-vista-previa');
            imagenVistaPrevia.style.display = 'none';

            codigo = '';
            descripcion = '';
            cantidad = '';
            precio = '';
            proveedor = '';
            imagen_url = '';
            imagenSeleccionada = null;
            imagenUrlTemp = null;
            mostrarDatosProducto = false;

            document.getElementById('datos-producto').style.display = 'none';
        }

        document.getElementById('datos-producto').style.display = 'none';
    </script>
</body>
</html>
