<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/png">
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <title>Manarem - ¡Ingresa y Encuentra tus Animes, Mangas y Música!</title>
</head>
<body>
    <header>
        <div class="head-grid-container">
            <h2 id="icono">Manarem</h2>
            <a class="hipervin"  id="h_home" href="/">Home</a>
            <a class="hipervin"  id="h_recomendados" href="/recomend">Recomendados</a>
            <a class="hipervin"  id="h_musica" href="/musica">Musica</a>
            <div id="h_divotros" class="drop_otros">
                <div class="hipervin" id="h_otros">Otros</div>
                <div class="drop_otros_conten">
                    <a class="hipervin" href="/acerca-de">Acerca de</a>
                    <a class="hipervin" href="/contacto">Contacto</a>
                    <a class="hipervin" href="/preguntas-frecuentes">Preguntas Frecuentes</a>
                    <a class="hipervin" href="/opiniones">Opiniones</a>
                </div>
            </div> 
            <a class="hipervin"  id="h_ingresar" href="/ingresar">Ingresar</a>
            <a class="hipervin"  id="h_registrarse" href="/registrarse">Registrarse</a>
        </div>
    </header>
    <section class="container">
        <div>
            <form id="formLogin" class="formContainer">
                <h3 class="boxHed">Iniciar Sesion</h3>
                <label>Usuario</label><input type="text" id="usuario" class="inputData" required>
                <label>Contraseña</label><input type="password" id="password" class="inputData" required>
                <button type="submit" class="boxFunc btn-enviar">ENVIAR</button>
            </form>
        </div>
    </section>
    <footer class="footer">
        <div class="footer-contenido">
            <p class="footer-copy">&copy; 2025copy; 2024 Manarem. Todos los derechos reservados.</p>
            <p class="footer-tech">Hecho con HTML5, CSS3, JavaScript y Python</p>
            <div class="footer-autores">
                <a href="https://github.com/an4tsu" target="_blank" rel="noopener">Cesar Augusto Fernandez Carbonell</a>
                <span class="footer-sep">&bull;</span>
                <a href="https://github.com/JohnCVF9" target="_blank" rel="noopener">John CV</a>
                <span class="footer-sep">&bull;</span>
                <a href="https://github.com/Quiroz-Monica-R" target="_blank" rel="noopener">Monica Quiroz</a>
            </div>
        </div>
    </footer>
    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                usuario: document.getElementById('usuario').value,
                password: document.getElementById('password').value
            };
            try {
                const result = await api.auth.login(data);
                if (result.error) {
                    showAlert('Credenciales incorrectas.', 'error');
                } else {
                    localStorage.setItem('user', JSON.stringify(result.usuario || result));
                    showAlert('¡Inicio de sesión exitoso!', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                }
            } catch (error) {
                showAlert('No se pudo conectar con el servidor.', 'error');
            }
        });
    </script>
</body>
</html>
