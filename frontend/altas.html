<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Alta de productos en el catálogo de Manarem.">
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/footer.css">
    <link rel="stylesheet" href="/static/css/formulario.css">
    <link rel="icon" href="/static/img/Aqua-Bored-favicon.ico" type="image/x-icon">
    <title>Alta de producto — Manarem</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="container">
                <div class="form-card">
                    <h1>Alta de producto</h1>
                    <p class="form-sub">Cargá un producto nuevo en el catálogo.</p>
                    <form id="formulario" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="descripcion">Descripción</label>
                            <input type="text" id="descripcion" name="descripcion" required>
                        </div>
                        <div class="form-group">
                            <label for="cantidad">Cantidad</label>
                            <input type="number" id="cantidad" name="cantidad" required>
                        </div>
                        <div class="form-group">
                            <label for="precio">Precio</label>
                            <input type="number" step="0.01" id="precio" name="precio" required>
                        </div>
                        <div class="form-group">
                            <label for="imagenProducto">Imagen del producto</label>
                            <input type="file" id="imagenProducto" name="imagen">
                        </div>
                        <div class="form-group">
                            <label for="proveedorProducto">Proveedor</label>
                            <input type="text" id="proveedorProducto" name="proveedor">
                        </div>
                        <button type="submit" class="btn">Crear producto</button>
                    </form>
                    <p class="form-alt"><a href="/productos">← Volver al menú</a></p>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/mock-data.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('formulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(document.getElementById('formulario'));
            try {
                const result = await api.productos.crear(formData);
                if (result.mensaje) {
                    showAlert(result.mensaje, 'success');
                    document.getElementById('formulario').reset();
                } else {
                    showAlert('Error al agregar el producto.', 'error');
                }
            } catch (error) {
                showAlert('No se pudo conectar con el servidor.', 'error');
            }
        });
    </script>
</body>
</html>
